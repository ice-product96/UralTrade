# /etc/nginx/sites-available/uraltrade
# ln -sf /etc/nginx/sites-available/uraltrade /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
#
# SSL: certbot --nginx -d uraltrade.ice-product.ru

upstream uraltrade_app {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    server_name uraltrade.ice-product.ru;

    # После certbot можно включить редирект на HTTPS:
    # return 301 https://$host$request_uri;

    client_max_body_size 32M;

    location / {
        proxy_pass http://uraltrade_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

