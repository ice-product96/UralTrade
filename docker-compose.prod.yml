# Production compose for VPS (ice-server style).
# Postgres is internal-only; app is bound to 127.0.0.1 for nginx reverse proxy.
#
# Usage:
#   cp .env.example .env   # fill in secrets and domain
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app npm run db:migrate
#   docker compose -f docker-compose.prod.yml exec app npm run db:seed

name: uraltrade

services:
  postgres:
    image: postgres:16-alpine
    container_name: uraltrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uraltrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uraltrade}
    volumes:
      - uraltrade_postgres_data:/var/lib/postgresql/data
    networks:
      - uraltrade
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-uraltrade} -d ${POSTGRES_DB:-uraltrade}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: uraltrade-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:-uraltrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uraltrade}
      DATABASE_URL: postgresql://${POSTGRES_USER:-uraltrade}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-uraltrade}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3010}:3000"
    networks:
      - uraltrade
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  uraltrade:
    driver: bridge

volumes:
  uraltrade_postgres_data:
