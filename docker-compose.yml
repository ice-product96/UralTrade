services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uraltrade
      POSTGRES_PASSWORD: uraltrade
      POSTGRES_DB: uraltrade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://uraltrade:uraltrade@postgres:5432/uraltrade?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      SITE_URL: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
